
<!DOCTYPE html>

<head>
   
    <title>Document</title>
    <style>
        a:hover{
            color:orange;
            text-decoration: none;
        }
        a:visited{
            color: green;
            font-weight: bold;
        }
        li:first-child{
            font-size: 46px;
        }
        li:last-child{
            color: maroon;
            font-size: 46px;
        }
        li:nth-child(even){
            color:rgb(12, 74, 198);
            font-size: 35px;
        
        }
        li:nth-child(odd){
            color: brown;
            font-size: 40px;
        }
    </style>
</head>
